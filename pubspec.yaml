name: dvr_timer
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.5.0
  get: ^4.7.3
  dio: ^5.9.2
  webview_flutter: ^4.14.0
  crypto: ^3.0.7
  device_info_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  # إعدادات الأندرويد الحديث عشان نلغي اللون البنفسجي
  adaptive_icon_background: "#FFFFFF" # هنا خلينا الخلفية لونها أبيض (تقدر تغير الكود لأي لون)
  adaptive_icon_foreground: "assets/images/logo.png" # اللوجو بتاعك في المقدمة
